<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Наклейка A4 — QR код</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #777;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px;
  }

  .page {
    width: 794px;
    height: 1123px;
    background: #c8c8c8;
    flex-shrink: 0;
    box-shadow: 0 10px 50px rgba(0,0,0,0.5);
    position: relative;
  }

  /* Sticker: inset 28px → 738×1067px */
  .sticker {
    position: absolute;
    inset: 28px;
    background: #fff;
    border-radius: 48px;
    overflow: hidden;
    /* Use absolute positioning for children — no flex trickery */
  }

  .sticker::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 48px;
    border: 1px dashed #bbb;
    pointer-events: none;
  }

  /*
    Sticker inner: 738 × 1067
    Measured text block (h1+h2+h3 with their line gaps): 210px tall
    Divider: 3px
    CTA: 72px
    Target equal gaps (g) between:
      top-edge → text-top
      text-bottom → divider1-top
      divider1-bottom → qr-top
      qr-bottom → divider2-top
      divider2-bottom → cta-top
      cta-bottom → bottom-edge

    total = 6g + 210 + 3 + QR + 3 + 72 = 1067
    We want QR to be square and as large as possible.
    Set g = 40px:
    QR = 1067 - 6×40 - 210 - 3 - 3 - 72 = 1067 - 240 - 288 = 539px

    Layout (absolute y from sticker top):
    text-top    = 40
    text-bottom = 40 + 210 = 250
    div1-top    = 250 + 40 = 290
    div1-bottom = 293
    qr-top      = 293 + 40 = 333
    qr-bottom   = 333 + 539 = 872
    div2-top    = 872 + 40 = 912
    div2-bottom = 915
    cta-top     = 915 + 40 = 955
    cta-bottom  = 955 + 72 = 1027
    bottom-gap  = 1067 - 1027 = 40 ✓
  */

  .text-block {
    position: absolute;
    top: 40px;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .text-block h1 {
    font-family: 'Montserrat', 'Arial Black', sans-serif;
    font-weight: 900;
    font-size: 118px;
    line-height: 1;
    letter-spacing: -2px;
    color: #111;
    text-align: center;
  }

  .text-block h2 {
    font-family: 'Montserrat', 'Arial Black', sans-serif;
    font-weight: 900;
    font-size: 73px;
    line-height: 1;
    letter-spacing: -1px;
    color: #111;
    text-align: center;
    margin-top: 6px;
  }

  .text-block h3 {
    font-family: 'Montserrat', 'Arial Black', sans-serif;
    font-weight: 900;
    font-size: 60px;
    line-height: 1;
    letter-spacing: 0;
    color: #111;
    text-align: center;
    margin-top: 5px;
  }

  .div1 {
    position: absolute;
    top: 290px;
    left: 52px; right: 52px;
    height: 3px;
    background: #111;
  }

  .qr-block {
    position: absolute;
    top: 333px;
    left: 99px; /* (738-540)/2 = 99 */
    width: 540px;
    height: 540px;
  }

  .qr-block svg {
    width: 100%;
    height: 100%;
  }

  .div2 {
    position: absolute;
    top: 912px;
    left: 52px; right: 52px;
    height: 3px;
    background: #111;
  }

  .cta-block {
    position: absolute;
    top: 955px;
    left: 52px; right: 52px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cta-block span {
    font-family: 'Montserrat', 'Arial Black', sans-serif;
    font-weight: 900;
    font-size: 72px;
    line-height: 1;
    color: #111;
  }

  .cta-block .label {
    letter-spacing: 3px;
  }

  @media print {
    body { background: none; padding: 0; min-height: unset; }
    .page { box-shadow: none; width: 210mm; height: 297mm; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="sticker">

    <div class="text-block">
      <h1>ХОЧЕШ</h1>
      <h2>ПРАЦЮВАТИ</h2>
      <h3>НА ЦЬОМУ АВТО?</h3>
    </div>

    <div class="div1"></div>

    <div class="qr-block">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
        <rect width="300" height="300" fill="#fff"/>
        <g transform="scale(10.345)">
          <path fill-rule="evenodd" fill="#111"
            d="M8 0L8 1L9 1L9 2L8 2L8 5L9 5L9 4L11 4L11 5L10 5L10 10L9 10L9 11L8 11L8 12L5 12L5 13L8 13L8 15L7 15L7 14L6 14L6 15L5 15L5 14L4 14L4 15L3 15L3 14L2 14L2 13L4 13L4 12L3 12L3 11L5 11L5 10L6 10L6 11L7 11L7 10L6 10L6 9L7 9L7 8L6 8L6 9L4 9L4 8L0 8L0 9L1 9L1 11L0 11L0 12L2 12L2 13L0 13L0 15L3 15L3 16L6 16L6 17L4 17L4 18L2 18L2 20L1 20L1 21L4 21L4 20L3 20L3 19L5 19L5 21L8 21L8 22L9 22L9 23L10 23L10 24L9 24L9 25L8 25L8 29L12 29L12 28L14 28L14 27L15 27L15 28L17 28L17 29L21 29L21 27L20 27L20 25L24 25L24 26L23 26L23 27L22 27L22 29L24 29L24 28L26 28L26 27L27 27L27 29L28 29L28 27L29 27L29 25L28 25L28 24L26 24L26 22L27 22L27 23L28 23L28 22L29 22L29 21L27 21L27 18L28 18L28 15L29 15L29 13L27 13L27 12L25 12L25 9L27 9L27 8L24 8L24 9L22 9L22 8L19 8L19 9L18 9L18 7L19 7L19 6L20 6L20 7L21 7L21 5L20 5L20 4L18 4L18 3L20 3L20 2L19 2L19 1L20 1L20 0L17 0L17 1L16 1L16 0L12 0L12 1L11 1L11 0L10 0L10 1L9 1L9 0ZM14 1L14 2L11 2L11 4L12 4L12 3L13 3L13 5L12 5L12 6L11 6L11 8L12 8L12 6L13 6L13 8L14 8L14 9L15 9L15 7L16 7L16 6L15 6L15 5L16 5L16 4L17 4L17 3L18 3L18 1L17 1L17 3L16 3L16 1ZM14 3L14 5L13 5L13 6L14 6L14 7L15 7L15 6L14 6L14 5L15 5L15 4L16 4L16 3ZM17 5L17 7L18 7L18 6L19 6L19 5ZM8 6L8 7L9 7L9 6ZM8 8L8 9L9 9L9 8ZM28 8L28 10L26 10L26 11L28 11L28 12L29 12L29 11L28 11L28 10L29 10L29 8ZM2 9L2 11L3 11L3 9ZM11 9L11 10L12 10L12 9ZM16 9L16 10L14 10L14 11L11 11L11 13L10 13L10 14L9 14L9 15L10 15L10 17L11 17L11 18L9 18L9 16L8 16L8 18L7 18L7 17L6 17L6 18L7 18L7 19L6 19L6 20L7 20L7 19L8 19L8 18L9 18L9 20L8 20L8 21L10 21L10 20L11 20L11 22L10 22L10 23L14 23L14 22L15 22L15 23L17 23L17 24L18 24L18 25L17 25L17 28L20 28L20 27L19 27L19 25L20 25L20 23L17 23L17 22L18 22L18 20L17 20L17 19L18 19L18 18L19 18L19 19L20 19L20 20L19 20L19 22L20 22L20 20L23 20L23 19L24 19L24 20L26 20L26 18L25 18L25 17L24 17L24 15L25 15L25 16L26 16L26 17L27 17L27 15L26 15L26 13L25 13L25 12L23 12L23 10L22 10L22 13L24 13L24 14L23 14L23 16L21 16L21 17L22 17L22 18L21 18L21 19L20 19L20 17L18 17L18 14L19 14L19 12L20 12L20 13L21 13L21 12L20 12L20 10L19 10L19 12L18 12L18 10L17 10L17 9ZM16 10L16 11L17 11L17 10ZM8 12L8 13L9 13L9 12ZM12 12L12 13L11 13L11 14L10 14L10 15L11 15L11 16L12 16L12 17L13 17L13 16L12 16L12 14L13 14L13 15L14 15L14 18L13 18L13 21L16 21L16 22L17 22L17 20L15 20L15 19L17 19L17 18L18 18L18 17L17 17L17 14L18 14L18 13L16 13L16 12L14 12L14 14L13 14L13 12ZM14 14L14 15L15 15L15 17L16 17L16 18L17 18L17 17L16 17L16 14ZM21 14L21 15L22 15L22 14ZM6 15L6 16L7 16L7 15ZM19 15L19 16L20 16L20 15ZM0 16L0 17L2 17L2 16ZM23 17L23 18L24 18L24 19L25 19L25 18L24 18L24 17ZM0 18L0 19L1 19L1 18ZM11 19L11 20L12 20L12 19ZM21 21L21 24L24 24L24 21ZM22 22L22 23L23 23L23 22ZM12 24L12 26L10 26L10 25L9 25L9 26L10 26L10 28L12 28L12 26L13 26L13 27L14 27L14 26L15 26L15 27L16 27L16 26L15 26L15 24ZM25 24L25 25L26 25L26 26L24 26L24 27L26 27L26 26L27 26L27 27L28 27L28 25L26 25L26 24ZM13 25L13 26L14 26L14 25ZM0 0L0 7L7 7L7 0ZM1 1L1 6L6 6L6 1ZM2 2L2 5L5 5L5 2ZM22 0L22 7L29 7L29 0ZM23 1L23 6L28 6L28 1ZM24 2L24 5L27 5L27 2ZM0 22L0 29L7 29L7 22ZM1 23L1 28L6 28L6 23ZM2 24L2 27L5 27L5 24Z"/>
        </g>
      </svg>
    </div>

    <div class="div2"></div>

    <div class="cta-block">
      <span>»</span>
      <span class="label">СКАНУЙ!</span>
      <span>«</span>
    </div>

  </div>
</div>

<script>
// After font loads, measure actual text block height and adjust positions
document.fonts.ready.then(() => {
  const sticker = document.querySelector('.sticker');
  const textBlock = document.querySelector('.text-block');
  const stickerH = sticker.offsetHeight; // 1067
  const textH = textBlock.offsetHeight;
  const divH = 3;
  const ctaH = 72;
  // 6 equal gaps
  const gap = Math.round((stickerH - textH - divH - 540 - divH - ctaH) / 6);

  const textTop = gap;
  const div1Top = textTop + textH + gap;
  const qrTop = div1Top + divH + gap;
  const div2Top = qrTop + 540 + gap;
  const ctaTop = div2Top + divH + gap;

  document.querySelector('.text-block').style.top = textTop + 'px';
  document.querySelector('.div1').style.top = div1Top + 'px';
  document.querySelector('.qr-block').style.top = qrTop + 'px';
  document.querySelector('.div2').style.top = div2Top + 'px';
  document.querySelector('.cta-block').style.top = ctaTop + 'px';
});
</script>
</body>
</html>
